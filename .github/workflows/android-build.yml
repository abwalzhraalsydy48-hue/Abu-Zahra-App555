name: Android Build & Release

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee build-debug.log
      continue-on-error: true

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace --no-daemon 2>&1 | tee build-release.log
      continue-on-error: true

    - name: Find APK files
      run: |
        echo "=== Finding APK files ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APKs found"
        echo "=== Build outputs ==="
        ls -la app/build/outputs/apk/ 2>/dev/null || echo "No output dir"
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug dir"
        ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "No release dir"

    - name: Upload Debug APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn

    - name: Upload Release APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: warn

    - name: Upload Build Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: |
          build-debug.log
          build-release.log
        if-no-files-found: warn

    - name: Copy APK to release folder
      run: |
        mkdir -p release
        cp app/build/outputs/apk/debug/*.apk release/ 2>/dev/null || true
        cp app/build/outputs/apk/release/*.apk release/ 2>/dev/null || true
        ls -la release/ 2>/dev/null || echo "No release files"
        # Rename for clarity
        for f in release/*.apk; do
          if [ -f "$f" ]; then
            base=$(basename "$f" .apk)
            mv "$f" "release/${base}-$(date +%Y%m%d-%H%M).apk" 2>/dev/null || true
          fi
        done
        ls -la release/ 2>/dev/null || true

    - name: Commit and Push APK
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -f release/*.apk 2>/dev/null || true
        git diff --staged --quiet || git commit -m "Build APK - $(date +%Y%m%d-%H%M%S)"
        git push
