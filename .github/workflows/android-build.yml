name: Android Build & Release

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Verify gradle wrapper
      run: |
        chmod +x gradlew
        ls -la gradle/wrapper/
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          echo "ERROR: gradle-wrapper.jar is missing!"
          exit 1
        fi

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace --no-daemon
      continue-on-error: true

    - name: List APK files
      run: |
        echo "=== Finding APK files ==="
        find . -name "*.apk" -type f 2>/dev/null
        echo "=== Debug APK ==="
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK"
        echo "=== Release APK ==="
        ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "No release APK"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: warn

    - name: Push APK to repo
      run: |
        mkdir -p release
        cp app/build/outputs/apk/debug/*.apk release/ 2>/dev/null || true
        cp app/build/outputs/apk/release/*.apk release/ 2>/dev/null || true

        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        # Force add APK files (they might be in .gitignore)
        git add -f release/*.apk 2>/dev/null || true

        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "No APK files to commit"
        else
          git commit -m "Build APK - $(date +%Y%m%d-%H%M%S)"
          git push
        fi
